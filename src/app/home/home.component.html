<div class="home-page">

  <!-- Brand -->
  <div class="home-brand">
    <svg width="32" height="32" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect width="28" height="28" rx="8" fill="#0ab4a8"/>
      <path d="M14 5L5 11v12h6v-7h6v7h6V11L14 5z" fill="white"/>
    </svg>
    <span class="brand-name">ResideEase</span>
  </div>

  <div class="home-card">

    <div class="card-head">
      <h1>Welcome back</h1>
      <p>Sign in to continue. Your dashboard will open automatically based on your role.</p>
    </div>

    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="login()" novalidate>

        <div class="field-group">
          <label for="identifier">Username / Email / Roll Number</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 20 20" fill="none">
              <circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.5"/>
              <path d="M4 17c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input id="identifier" type="text" formControlName="identifier"
                   placeholder="Enter username, email or roll number"
                   autocomplete="off" />
          </div>
        </div>

        <div class="field-group">
          <label for="secret">Password / Phone Number</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 20 20" fill="none">
              <rect x="3" y="9" width="14" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M7 9V6a3 3 0 016 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input id="secret" [type]="showSecret ? 'text' : 'password'" formControlName="secret"
                   placeholder="Enter password or phone number"
                   autocomplete="off" />
            <button type="button" class="toggle-secret" (click)="showSecret = !showSecret"
                    [attr.aria-label]="showSecret ? 'Hide' : 'Show'">
              @if (showSecret) {
                <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M3 3l14 14M8.5 8.7A3 3 0 0012.8 13M6.5 6.7C4.6 7.9 3 10 3 10s3 5 7 5c1.4 0 2.7-.5 3.8-1.2M10.5 5.1C10.3 5 10.2 5 10 5c-4 0-7 5-7 5s.7 1.1 2 2.3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
              } @else {
                <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M1 10s3-6 9-6 9 6 9 6-3 6-9 6-9-6-9-6z" stroke="currentColor" stroke-width="1.4"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/></svg>
              }
            </button>
          </div>
        </div>

        @if (error) {
          <div class="error-msg">
            <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/><path d="M10 6v4M10 13v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            {{ error }}
          </div>
        }

        <button class="btn-signin" type="submit" [disabled]="loading">
          @if (loading) {
            <span class="spinner"></span> Signing in…
          } @else {
            Sign In
            <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
              <path d="M4 10h12M10 4l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          }
        </button>

      </form>
    </div>

  </div>

  <div class="guest-cta">
    <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
      <path d="M10 10a3.5 3.5 0 100-7 3.5 3.5 0 000 7zm-6.5 8a6.5 6.5 0 0113 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    Visiting as a guest?
    <button type="button" (click)="registerAsGuest()">Register here</button>
  </div>

  <p class="home-footer">Powered by ResideEase</p>

</div>
