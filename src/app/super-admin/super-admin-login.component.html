<div class="login-page">
  <div class="login-card">

    <!-- Brand mark -->
    <div class="login-brand">
      <div class="brand-logo" aria-label="ResideEase logo">
        <svg width="26" height="26" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="28" height="28" rx="8" fill="#7c3aed"/>
          <path d="M14 5L5 11v12h6v-7h6v7h6V11L14 5z" fill="white"/>
        </svg>
      </div>
      <span class="brand-name">ResideEase</span>
    </div>

    <div class="login-head">
      <span class="login-eyebrow">Super Admin</span>
      <h1>Welcome back</h1>
      <p>Sign in to manage hostel setup, configure settings, and create staff accounts.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="login()" novalidate>
      <div class="field-group">
        <label for="username">Username</label>
        <input id="username" type="text" formControlName="username" placeholder="e.g. superadmin" autocomplete="username" />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Enter your password" autocomplete="current-password" />
      </div>

      @if (errorMessage) {
        <div class="error-message">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="10" cy="10" r="8" stroke="currentColor" stroke-width="1.5"/>
            <path d="M10 6v4M10 13v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          {{ errorMessage }}
        </div>
      }

      <button class="btn-login" type="submit" [disabled]="loading">
        @if (!loading) {
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M3 10h14M10 4l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
        {{ loading ? 'Signing in…' : 'Sign In' }}
      </button>
    </form>

    <p class="login-note">This portal is restricted to super administrators only.</p>
  </div>
</div>
